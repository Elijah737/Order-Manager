<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Order Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Sans:wght@400;500;600&display=swap');
:root {
  --bg:#0f0f11;--surface:#1a1a1f;--surface2:#222228;--border:#2e2e38;
  --text:#f0eee8;--muted:#6b6878;--accent:#e8c547;--accent-dim:#2a2510;
  --green:#4ade80;--green-dim:#0d2318;--red:#f87171;--red-dim:#2a0f0f;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
/* HOME */
.home-header{padding:52px 24px 24px;border-bottom:1px solid var(--border);}
.home-header h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-0.03em;line-height:1;}
.home-header p{font-size:0.78rem;color:var(--muted);margin-top:6px;letter-spacing:0.04em;}
.forms-list{flex:1;padding:16px;display:flex;flex-direction:column;gap:10px;}
.form-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s,background .15s;position:relative;overflow:hidden;}
.form-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);border-radius:4px 0 0 4px;}
.form-card:active{background:var(--surface2);border-color:var(--accent);}
.fc-icon{width:42px;height:42px;border-radius:10px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.fc-info{flex:1;min-width:0;}
.fc-info h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fc-info p{font-size:0.72rem;color:var(--muted);margin-top:3px;}
.fc-actions{display:flex;gap:4px;}
.cbtn{background:none;border:1px solid var(--border);color:var(--muted);font-size:0.75rem;padding:5px 9px;border-radius:6px;cursor:pointer;font-family:'Instrument Sans',sans-serif;}
.cbtn:active{background:var(--surface2);}
.cbtn.danger:active{background:var(--red-dim);color:var(--red);border-color:var(--red);}
.empty-home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:0.85rem;gap:10px;padding:40px;text-align:center;}
.empty-home .icon{font-size:3rem;}
.fab{position:fixed;bottom:28px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#0f0f11;font-size:1.6rem;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(232,197,71,.35);z-index:50;font-weight:700;transition:transform .15s;}
.fab:active{transform:scale(.93);}
/* ORDER */
.order-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 10px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40;}
.back-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ohi{flex:1;min-width:0;}
.ohi h2{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ohi p{font-size:0.68rem;color:var(--muted);margin-top:2px;}
.hbtns{display:flex;gap:6px;}
.hbtn{font-family:'Instrument Sans',sans-serif;font-size:0.72rem;font-weight:600;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;letter-spacing:.02em;}
.hbtn-export{background:var(--green);color:#0a1a10;}
.hbtn-export:active{opacity:.8;}
.hbtn-clear{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.order-items{padding:12px;display:flex;flex-direction:column;gap:6px;}
.item-row{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;display:flex;align-items:center;overflow:hidden;transition:border-color .15s;}
.item-row.filled{border-color:var(--green);background:var(--green-dim);}
.item-main{flex:1;padding:10px 12px;min-width:0;}
.item-name{font-size:.9rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-unit{font-size:.68rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;}
.item-par{font-size:.68rem;color:var(--accent);margin-top:2px;letter-spacing:.04em;}
.qty-wrap{display:flex;align-items:center;border-left:1px solid var(--border);background:var(--surface2);}
.qty-btn{width:36px;height:52px;background:none;border:none;color:var(--text);font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-btn:active{background:var(--border);}
.qty-input{width:52px;background:transparent;border:none;color:var(--text);font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;text-align:center;outline:none;padding:0;height:52px;}
.qty-input::placeholder{color:var(--muted);font-size:.8rem;font-weight:400;}
.order-footer{padding:12px 16px 32px;display:flex;align-items:center;justify-content:space-between;}
.order-stat{font-size:.75rem;color:var(--muted);}
.order-stat strong{color:var(--green);}
/* EDITOR */
.editor-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 10px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40;}
.editor-header h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;flex:1;}
.save-btn{background:var(--accent);color:#0f0f11;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;padding:9px 16px;border-radius:8px;cursor:pointer;}
.save-btn:active{opacity:.8;}
.editor-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
.field-group{display:flex;flex-direction:column;gap:6px;}
.field-label{font-size:.68rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;font-weight:600;}
.field-input{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;font-family:'Instrument Sans',sans-serif;font-size:.95rem;color:var(--text);outline:none;width:100%;}
.field-input:focus{border-color:var(--accent);}
.emoji-picker{display:flex;gap:8px;flex-wrap:wrap;}
.emoji-opt{width:44px;height:44px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.emoji-opt.selected{border-color:var(--accent);background:var(--accent-dim);}
.section-label{font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;color:var(--text);padding:10px 0 4px;border-top:1px solid var(--border);margin-top:6px;}
.template-items{display:flex;flex-direction:column;gap:8px;}
.ti-row{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;display:flex;align-items:center;gap:8px;padding:8px 10px;}
.ti-inputs{flex:1;display:flex;gap:8px;min-width:0;}
.ti-name,.ti-unit{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:'Instrument Sans',sans-serif;font-size:.85rem;color:var(--text);outline:none;min-width:0;}
.ti-name{flex:2;}
.ti-unit{flex:1;}
.ti-name:focus,.ti-unit:focus{border-color:var(--accent);}
.ti-del{background:none;border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:6px;font-size:.9rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ti-del:active{background:var(--red-dim);color:var(--red);border-color:var(--red);}
.add-item-btn{background:var(--surface);border:1.5px dashed var(--border);border-radius:10px;padding:12px;font-family:'Instrument Sans',sans-serif;font-size:.85rem;color:var(--muted);cursor:pointer;text-align:center;width:100%;}
.add-item-btn:active{border-color:var(--accent);color:var(--accent);}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:12px 20px 40px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-pill{width:36px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 16px;}
.modal h3{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:.75rem;color:var(--muted);margin-bottom:14px;}
.export-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px;font-family:'Courier New',monospace;font-size:.8rem;color:var(--text);white-space:pre-wrap;word-break:break-word;line-height:1.75;max-height:40vh;overflow-y:auto;}
.modal-btns{display:flex;gap:10px;margin-top:14px;}
.mbtn{flex:1;padding:13px;border-radius:10px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;}
.mbtn-copy{background:var(--green);color:#0a1a10;}
.mbtn-print{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.mbtn-close{background:var(--surface2);color:var(--muted);border:1px solid var(--border);flex:0;padding:13px 16px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#0a1a10;font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;padding:10px 20px;border-radius:30px;z-index:999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media print{body *{display:none!important;}#print-area{display:block!important;color:#000;font-family:monospace;white-space:pre;font-size:14px;padding:20px;}}
#print-area{display:none;}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-header">
    <h1>Order Manager</h1>
    <p>Select a company to fill an order</p>
  </div>
  <div class="forms-list" id="forms-list"></div>
  <button class="fab" onclick="newForm()">＋</button>
</div>

<!-- ORDER -->
<div class="screen" id="order-screen">
  <div class="order-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="ohi">
      <h2 id="order-title"></h2>
      <p id="order-subtitle"></p>
    </div>
    <div class="hbtns">
      <button class="hbtn hbtn-clear" onclick="clearOrder()">Reset</button>
      <button class="hbtn hbtn-export" onclick="openExport()">Export</button>
    </div>
  </div>
  <div class="order-items" id="order-items"></div>
  <div class="order-footer">
    <span class="order-stat" id="order-stat">Fill quantities to export</span>
    <button class="hbtn hbtn-export" onclick="openExport()">Export ↗</button>
  </div>
</div>

<!-- EDITOR -->
<div class="screen" id="editor-screen">
  <div class="editor-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <h2 id="editor-title">New Form</h2>
    <button class="save-btn" onclick="saveForm()">Save</button>
  </div>
  <div class="editor-body">
    <div class="field-group">
      <div class="field-label">Company / Supplier Name</div>
      <input class="field-input" id="f-name" type="text" placeholder="e.g. Sysco Foods">
    </div>
    <div class="field-group">
      <div class="field-label">Icon</div>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>
    <div class="section-label">Items</div>
    <div style="display:flex;gap:8px;margin-bottom:2px;">
      <span style="flex:2;font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding-left:4px">Item Name</span>
      <span style="flex:1;font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Unit (opt.)</span>
      <span style="width:54px;font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:center">Par</span>
      <span style="width:32px"></span>
    </div>
    <div class="template-items" id="template-items"></div>
    <button class="add-item-btn" onclick="addTemplateItem()">＋ Add Item</button>
    <div style="height:24px"></div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="export-modal" onclick="closeModalOut(event)">
  <div class="modal">
    <div class="modal-pill"></div>
    <h3 id="export-title">Order Export</h3>
    <div class="modal-sub" id="export-sub"></div>
    <div class="export-box" id="export-box"></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-copy" onclick="copyExport()">Copy Text</button>
      <button class="mbtn mbtn-print" onclick="printExport()">Print</button>
      <button class="mbtn mbtn-close" onclick="closeModal()">✕</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="print-area"></div>

<script>
let db={forms:[]};
let currentFormId=null;
let orderQtys={};
let editingFormId=null;
let templateItems=[];
let selectedEmoji='📦';

const EMOJIS=['🏪','🛒','📦','🍖','🥛','🥩','🧀','🫙','🧴','🧹','🍺','☕','🌿','🥫','🍞','🧂','🫒','🐟','🥚','🧊'];

function save(){try{localStorage.setItem('om3',JSON.stringify(db));}catch(e){}}
function saveQ(){try{localStorage.setItem('om3q',JSON.stringify(orderQtys));}catch(e){}}
function load(){
  try{const d=localStorage.getItem('om3');if(d)db=JSON.parse(d);if(!db.forms)db.forms=[];}catch(e){db={forms:[]};}
  try{const q=localStorage.getItem('om3q');if(q)orderQtys=JSON.parse(q);}catch(e){}
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2100);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// HOME
function renderHome(){
  const list=document.getElementById('forms-list');
  if(db.forms.length===0){
    list.innerHTML=`<div class="empty-home"><div class="icon">📦</div><strong>No order forms yet</strong><span>Tap ＋ to create your first supplier form.</span></div>`;
    return;
  }
  list.innerHTML=db.forms.map(f=>{
    const fc=getFilledCount(f.id);
    const sub=fc>0?`${f.items.length} items · <span style="color:var(--green)">${fc} queued</span>`:`${f.items.length} item${f.items.length!==1?'s':''} · tap to order`;
    return `<div class="form-card" onclick="openOrder('${f.id}')">
      <div class="fc-icon">${f.emoji||'📦'}</div>
      <div class="fc-info"><h3>${esc(f.name)}</h3><p>${sub}</p></div>
      <div class="fc-actions" onclick="event.stopPropagation()">
        <button class="cbtn" onclick="editForm('${f.id}')">Edit</button>
        <button class="cbtn danger" onclick="deleteForm('${f.id}')">Del</button>
      </div>
    </div>`;
  }).join('');
}

function getFilledCount(fid){
  const q=orderQtys[fid]||{};
  return Object.values(q).filter(v=>v!==''&&!isNaN(parseFloat(v))&&parseFloat(v)>0).length;
}

// ORDER
function openOrder(fid){
  const f=db.forms.find(x=>x.id===fid);if(!f)return;
  currentFormId=fid;
  if(!orderQtys[fid])orderQtys[fid]={};
  document.getElementById('order-title').textContent=f.name;
  showScreen('order-screen');
  renderOrder();
}

function renderOrder(){
  const f=db.forms.find(x=>x.id===currentFormId);if(!f)return;
  const q=orderQtys[currentFormId]||{};
  const fc=Object.values(q).filter(v=>v!==''&&!isNaN(parseFloat(v))&&parseFloat(v)>0).length;
  document.getElementById('order-subtitle').textContent=`${f.items.length} items · ${fc} filled`;
  document.getElementById('order-stat').innerHTML=fc>0?`<strong>${fc}</strong> item${fc!==1?'s':''} ready to export`:'Fill quantities to export';
  document.getElementById('order-items').innerHTML=f.items.map((item,i)=>{
    const v=q[i]!==undefined?q[i]:'';
    const filled=v!==''&&!isNaN(parseFloat(v))&&parseFloat(v)>0;
    return `<div class="item-row${filled?' filled':''}" id="row-${i}">
      <div class="item-main">
        <div class="item-name">${esc(item.name)}</div>
        ${item.unit||item.par?`<div class="item-unit">${item.unit?esc(item.unit):''}${item.unit&&item.par?' · ':''}${item.par?`<span class="item-par" style="color:var(--accent)">Par: ${esc(String(item.par))}</span>`:''}</div>`:''}
      </div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="adjQty(${i},-1)">−</button>
        <input class="qty-input" type="number" inputmode="decimal" min="0" placeholder="qty"
          value="${esc(String(v))}" oninput="setQty(${i},this.value)" onfocus="this.select()">
        <button class="qty-btn" onclick="adjQty(${i},1)">＋</button>
      </div>
    </div>`;
  }).join('');
}

function setQty(i,v){
  if(!orderQtys[currentFormId])orderQtys[currentFormId]={};
  orderQtys[currentFormId][i]=v;saveQ();
  const row=document.getElementById('row-'+i);
  if(row)row.classList.toggle('filled',v!==''&&!isNaN(parseFloat(v))&&parseFloat(v)>0);
  const q=orderQtys[currentFormId];
  const fc=Object.values(q).filter(v=>v!==''&&!isNaN(parseFloat(v))&&parseFloat(v)>0).length;
  const f=db.forms.find(x=>x.id===currentFormId);
  document.getElementById('order-subtitle').textContent=`${f.items.length} items · ${fc} filled`;
  document.getElementById('order-stat').innerHTML=fc>0?`<strong>${fc}</strong> item${fc!==1?'s':''} ready to export`:'Fill quantities to export';
}

function adjQty(i,d){
  const q=orderQtys[currentFormId]||{};
  let cur=parseFloat(q[i])||0;cur=Math.max(0,cur+d);
  orderQtys[currentFormId][i]=cur>0?String(cur):'';saveQ();renderOrder();
}

function clearOrder(){
  if(!confirm('Reset all quantities for this order?'))return;
  orderQtys[currentFormId]={};saveQ();renderOrder();
}

// EXPORT
let exportText='';
function openExport(){
  const f=db.forms.find(x=>x.id===currentFormId);
  const q=orderQtys[currentFormId]||{};
  const filled=f.items.map((item,i)=>({item,qty:q[i]})).filter(r=>r.qty!==undefined&&r.qty!==''&&!isNaN(parseFloat(r.qty))&&parseFloat(r.qty)>0);
  if(filled.length===0){toast('No quantities filled yet!');return;}
  const date=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  const maxN=Math.max(4,...filled.map(r=>(r.item.name||'').length));
  const hdr=`ORDER: ${f.name.toUpperCase()}\nDATE:  ${date}\n`;
  const div='─'.repeat(maxN+18);
  const rows=filled.map(r=>{
    const nm=(r.item.name||'').padEnd(maxN+2);
    const qv=String(r.qty).padStart(6);
    const u=r.item.unit?`  ${r.item.unit}`:'';
    return nm+qv+u;
  });
  exportText=`${hdr}\n${'ITEM'.padEnd(maxN+2)}${'QTY'.padStart(6)}  UNIT\n${div}\n${rows.join('\n')}\n${div}\nTotal lines: ${filled.length}`;
  document.getElementById('export-title').textContent=`${f.name} — Order`;
  document.getElementById('export-sub').textContent=`${filled.length} of ${f.items.length} items · ${date}`;
  document.getElementById('export-box').textContent=exportText;
  document.getElementById('export-modal').classList.add('open');
}

function copyExport(){
  const btn=document.querySelector('.mbtn-copy');
  // Try modern clipboard API first
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(exportText).then(()=>{
      btn.textContent='✓ Copied!';
      toast('✓ Copied to clipboard');
      setTimeout(()=>btn.textContent='Copy Text',2200);
    }).catch(()=>fallbackCopy(btn));
  } else {
    fallbackCopy(btn);
  }
}

function fallbackCopy(btn){
  // Create a visible textarea (required on iOS for execCommand to work)
  const ta=document.createElement('textarea');
  ta.value=exportText;
  ta.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80vw;height:120px;opacity:0;z-index:9999;font-size:16px;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  // iOS needs setSelectionRange
  ta.setSelectionRange(0,ta.value.length);
  let ok=false;
  try{ok=document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
  if(ok){
    if(btn){btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent='Copy Text',2200);}
    toast('✓ Copied to clipboard');
  } else {
    toast('Long-press the text above to copy');
  }
}

function printExport(){document.getElementById('print-area').textContent=exportText;window.print();}
function closeModal(){document.getElementById('export-modal').classList.remove('open');}
function closeModalOut(e){if(e.target===document.getElementById('export-modal'))closeModal();}

// EDITOR
function newForm(){
  editingFormId=null;templateItems=[{name:'',unit:''}];selectedEmoji=EMOJIS[0];
  document.getElementById('editor-title').textContent='New Form';
  document.getElementById('f-name').value='';
  renderEmojiPicker();renderTemplateItems();showScreen('editor-screen');
}

function editForm(fid){
  const f=db.forms.find(x=>x.id===fid);if(!f)return;
  editingFormId=fid;templateItems=f.items.map(i=>({...i}));selectedEmoji=f.emoji||EMOJIS[0];
  document.getElementById('editor-title').textContent='Edit Form';
  document.getElementById('f-name').value=f.name;
  renderEmojiPicker();renderTemplateItems();showScreen('editor-screen');
}

function saveForm(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){toast('Please enter a company name');return;}
  syncTemplateFromDOM();
  const valid=templateItems.filter(i=>i.name.trim());
  if(valid.length===0){toast('Add at least one item');return;}
  if(editingFormId){
    const f=db.forms.find(x=>x.id===editingFormId);
    f.name=name;f.emoji=selectedEmoji;f.items=valid;
  } else {
    db.forms.push({id:'f_'+Date.now(),name,emoji:selectedEmoji,items:valid});
  }
  save();toast('✓ Form saved');goHome();
}

function deleteForm(fid){
  const f=db.forms.find(x=>x.id===fid);
  if(!confirm(`Delete "${f.name}"?`))return;
  db.forms=db.forms.filter(x=>x.id!==fid);delete orderQtys[fid];
  save();saveQ();renderHome();toast('Form deleted');
}

function renderEmojiPicker(){
  document.getElementById('emoji-picker').innerHTML=EMOJIS.map(e=>
    `<button class="emoji-opt${e===selectedEmoji?' selected':''}" onclick="selEmoji('${e}')">${e}</button>`
  ).join('');
}

function selEmoji(e){selectedEmoji=e;renderEmojiPicker();}

function syncTemplateFromDOM(){
  document.querySelectorAll('.ti-row').forEach((row,idx)=>{
    const ni=row.querySelector('.ti-name');const ui=row.querySelector('.ti-unit');const pi=row.querySelector('.ti-par');
    if(templateItems[idx]){templateItems[idx].name=ni.value;templateItems[idx].unit=ui.value;templateItems[idx].par=pi.value;}
  });
}

function addTemplateItem(){
  syncTemplateFromDOM();
  templateItems.push({name:'',unit:'',par:''});renderTemplateItems();
  setTimeout(()=>{const ins=document.querySelectorAll('.ti-name');if(ins.length)ins[ins.length-1].focus();},40);
}

function removeTemplateItem(i){
  syncTemplateFromDOM();
  templateItems.splice(i,1);renderTemplateItems();
}

function renderTemplateItems(){
  document.getElementById('template-items').innerHTML=templateItems.map((item,i)=>`
    <div class="ti-row">
      <div class="ti-inputs">
        <input class="ti-name" type="text" placeholder="Item name" value="${esc(item.name)}">
        <input class="ti-unit" type="text" placeholder="ea / cs / lb" value="${esc(item.unit||'')}">
        <input class="ti-par" type="number" inputmode="numeric" min="0" placeholder="Par" value="${esc(String(item.par||''))}" style="width:54px;flex:none;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 6px;font-family:'Instrument Sans',sans-serif;font-size:.85rem;color:var(--accent);outline:none;text-align:center;">
      </div>
      <button class="ti-del" onclick="removeTemplateItem(${i})">✕</button>
    </div>`).join('');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome(){renderHome();showScreen('home');}

load();renderHome();
</script>
</body>
</html>
